
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Border with ::before and ::after</title>
<style>
body {
  background: #222;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.button {
  position: relative; /* Needed for absolute positioning of pseudo-elements */
  padding: 12px 30px;
  background: transparent;
  color: white;
  font-size: 18px;
  border: none;
  cursor: pointer;
  overflow: hidden; /* Hide overflow from pseudo-elements */
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Top & Bottom Borders */
.button::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: #00ffcc;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}

.button::after {
  content: "";
  position: absolute;
  bottom: 0;
  right: 0;
  width: 100%;
  height: 2px;
  background: #00ffcc;
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.3s ease;
}

/* Left & Right Borders using inner span */
.button span::before,
.button span::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 100%;
  background: #00ffcc;
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.3s ease-in-out;
}

.button span::after {
  left: auto;
  right: 0;
  transform-origin: bottom;
}

/* Hover Effect */
.button:hover::before {
  transform: scaleX(1);
}

.button:hover::after {
  transform: scaleX(1);
}

.button:hover span::before {
  transform: scaleY(1);
}

.button:hover span::after {
  transform: scaleY(1);
}
</style>
</head>

<body>
<button class="button"><span></span>Hover Me</button>


</body>
</html>

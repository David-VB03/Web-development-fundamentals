<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product ShowCase</title>
    <link rel="stylesheet" href="moduleIII.css" />
  </head>
  <body>
     <header>
        <h1>Our Products</h1>
    </header>
    <main>
        <div class="container">
            
        </div>
        <div class="product">
            <div class="product-image">
                <img src="https://edube.org/uploads/media/default/0001/04/product_image.jpg" alt="Some Sweet Candys">
                <span class="badge">Product Image New</span>
            </div>
            <h2>Product Name</h2>
            <p>Product description goes here. It's a brief overview of the product features.</p>
        </div>
        <table class="product-specs">
            <tr><th>Feature</th><th>Details</th></tr>
            <tr><td>Weight</td><td>1kg</td></tr>
            <tr><td>Color</td><td>Red</td></tr>
            <tr><td>Material</td><td>Plastic</td></tr>
        </table>
        <div class="contact-form">
            <form>
                <fieldset>
                    <legend>Contact Us</legend>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                 <span style='word-wrap: break-word;'><button type="submit">Submit</button></span>
                </fieldset>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2024 Online Store</p>
    </footer>






  </body>
</html>
